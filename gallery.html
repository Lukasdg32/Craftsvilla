<!DOCTYPE html>

</style>

<script>
function openLightbox(image) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = image.src;
    document.getElementById("lightbox-text").innerText = image.alt;
}
function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>

    <h1>Welcome to our gallery! Here you can explore moments from our workshops and finished artwork from Craftsvilla participants!</h1>
   <section  class="photo-gallery">
    <img class="gallery-img"
    src="images/gallery1.png"
    alt="Friends and family painting together at Craftsvilla"
    onclick="openLightbox(this)">

    <img class="gallery-img"
    src="images/craftsvilla-art.png"
    alt="Finished watercolor artwork created during a workshop."
    onclick="openLightbox(this)">

    <img class="gallery-img"
    src="images/family.png"
    alt="Family with finished artwork at Craftsvilla."
    onclick="openLightbox(this)">

    <img class="gallery-img"
    src="images/tools.png"
    alt="Art tools and materials included in every workshop."
    onclick="openLightbox(this)">

</section>

<div id="lightbox" onclick="closeLightbox()">
